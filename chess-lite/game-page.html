<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game</title>
    <meta name="author" content="Blake Kenworthy">
    <meta name="description" content="Chess Lite A site to play chess against a moderately strong chess bot">
    <link href="styles/style.css" rel="stylesheet">
    <script defer src="javascript/main.js"></script>
</head>

<body>
    <header>
        <img src="images/logo-attempt3.png" alt="chess-lite logo">
        <h1>Chess Lite</h1>
        <nav>
            <h2><a href="./index.html">Home Page</a></h2>

    <main>
            <aside>

                </button>
                <button id="end-game" aria-label="end-game">
                    <h3>End-Game</h3>
