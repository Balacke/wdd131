<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="Author" content="Blake Kenworthy">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Game</title>
    <meta name="description" content="Blake's version of the dice game, which is similar to yatzee">
    <script src="game.js" defer></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        img {
            height: 50px;
        }

        #gameboard {
            margin-top: 200px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
        }

        #rollButton {
            margin-top: 20px;
            background-color: white;
            color: black;
            padding: 12px 24px;
            border: 2px solid black;
            border-radius: 5px;
            box-shadow: 0 3px black;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        #rollButton:active {
            transform: translateY(4px);
            box-shadow: 0 1px black;
        }

        input[type="checkbox"] {
            accent-color: black;
        }
    </style>
</head>
<body>
    <h1>Farkle</h1>
    <p>I had some extra time tonight so I decided to turn it into farkle</p>
    <div id="scores">
        <p>Turn Score: <span id="turnScore">0</span></p>
        <p>Total Score: <span id="totalScore">0</span></p>
    </div>
    <div id="gameboard">
        <img class="dice1" src="assets/white_dice_1.gif">
        <img class="dice2" src="assets/white_dice_2.gif">
        <img class="dice3" src="assets/white_dice_3.gif">
        <img class="dice4" src="assets/white_dice_4.gif">
        <img class="dice5" src="assets/white_dice_5.gif">
        <input type="checkbox" class="dice1" value="1">
        <input type="checkbox" class="dice2" value="2">
        <input type="checkbox" class="dice3" value="3">
        <input type="checkbox" class="dice4" value="4">
        <input type="checkbox" class="dice5" value="5">
    </div>
    <button id="rollButton">Roll!</button>
    <button id="bankButton">Bank</button>
    <p id="message"></p>
</body>
</html>
