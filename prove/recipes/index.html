<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <meta name="author" content="Blake Kenworthy">
        <meta name="description" content="An online recipe book">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A collection of recipes">
    <meta property="og:url" content="https://balacke.github.io/wdd131/prove/recipes/index.html">
    <meta property="og:image" content="https://balacke.github.io/wdd131/prove/recipes/social-preview.png">
    <meta property="og:image:alt" content="A collection of recipes"> 

    <!-- X (Twitter) Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A collection of recipes">
    <meta name="twitter:image" content="https://balacke.github.io/wdd131/prove/recipes/social-preview.png">
    <meta name="twitter:image:alt" content="A collection of delicious recipes">
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">
    
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="./apple-icon.png">
    <link rel="stylesheet" href="recipes.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <script src="recipes.js" defer></script>
</head>
<body>
    <header>
        <img src="recipe_book_icon.png" class="medium" alt="recipe book logo">
        <h1>RECIPE BOOK</h1>
    </header>
    <div class="search">
        <input type="search" placeholder="Find a recipe" aria-label="Find a recipe" id="search">
        <button type="submit" id="searchButton" class="search-icon-btn" aria-label="Submit search">
            <img src="search_icon.png" alt="search icon" class="search-icon">
        </button>
    </div>
    <hr>
    <div id="recipeContainer">
    </div>



    <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="www.instagram.com"><img src="instagram_icon.png" alt="instagram icon" class="small"></a>
        <a href="www.youtube.com"><img src="youtube_icon.png" alt="youtube icon" class="small"></a>
        <a href="www.pinterest.com"><img src="pinterest_icon.png" alt="pinterest icon" class="small"></a>
    </div>
    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
    </footer>
</body>
</html>
