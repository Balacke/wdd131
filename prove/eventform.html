<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Form</title>
    <meta name="author" content="Blake">
    <link rel="icon" href="images/ticket_icon.png" type="image/png">
    <meta name="description" content="Event Form Page">
    <link rel="stylesheet" href="./styles/eventform.css">
    <script src="./javascript/eventform.js" defer></script>
</head>
<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>
    
        <form id="eventForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required />
            </div>
    
            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required />
            </div>
    
            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>
    
            <div class="field">
                <label for="attendee">Type</label>
                <select id="attendee" name="attendee" required>
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>
    
            <div class="field">
                <label for="availableDate">Event Date</label>
                <input id="availableDate" name="availableDate" type="date" required />
            </div>
    
            <div class="field full" hidden>
                <label for="studentId">Student I#</label>
                <input id="studentId" name="studentId" type="text">
            </div>

            <div class="field full" hidden>
                <label  for="accessCode">Access Code</label> 
                <input id="accessCode" name="accessCode" type="text">
            </div>
    
    
            <button class="full" type="submit">Create Ticket</button>
        </form>
    
        <section id="output" aria-live="polite"></section>
    </main>
</body>
</html>
